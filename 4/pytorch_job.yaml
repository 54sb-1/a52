# 1. 把 Python 代码包裹进 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: mnist-script-config
data:
  mnist_ddp.py: |
    import os
    import torch
    import torch.distributed as dist
    import torch.nn as nn
    import torch.optim as optim
    from torchvision import datasets, transforms
    from torch.nn.parallel import DistributedDataParallel as DDP
    import time
    
    def main():
        dist.init_process_group("nccl")
        local_rank = int(os.environ["LOCAL_RANK"])
        # 注意：因为华为云代金券买的通常是 CPU 机器，这里改为 CPU 后端防止报错
        # 如果是 GPU 节点，再改回 torch.cuda.set_device()
        device = torch.device("cpu") 
        
        transform = transforms.Compose([transforms.ToTensor(), transforms.Normalize((0.1307,), (0.3081,))])
        dataset = datasets.MNIST('./data', train=True, download=True, transform=transform)
        sampler = torch.utils.data.distributed.DistributedSampler(dataset)
        loader = torch.utils.data.DataLoader(dataset, batch_size=64, sampler=sampler)
        
        model = nn.Sequential(
            nn.Conv2d(1, 32, 3, 1), nn.ReLU(),
            nn.Conv2d(32, 64, 3, 1), nn.ReLU(),
            nn.MaxPool2d(2), nn.Flatten(),
            nn.Linear(9216, 128), nn.ReLU(), nn.Linear(128, 10)
        ).to(device)
        
        model = DDP(model, device_ids=None) # CPU 模式 device_ids 留空
        optimizer = optim.Adadelta(model.parameters(), lr=1.0)
        
        start_time = time.time()
        model.train()
        for epoch in range(1, 3):
            sampler.set_epoch(epoch)
            for batch_idx, (data, target) in enumerate(loader):
                data, target = data.to(device), target.to(device)
                optimizer.zero_grad()
                output = model(data)
                loss = nn.CrossEntropyLoss()(output, target)
                loss.backward()
                optimizer.step()
                
        if dist.get_rank() == 0:
            print(f"训练完成！总耗时: {time.time() - start_time:.2f} 秒")
        dist.destroy_process_group()

    if __name__ == '__main__':
        main()

---
# 2. PyTorchJob 调用代码
apiVersion: "kubeflow.org/v1"
kind: PyTorchJob
metadata:
  name: mnist-ddp
spec:
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      template:
        spec:
          containers:
          - name: pytorch
            image: pytorch/pytorch:latest
            # 明确指定使用挂载目录下的代码
            command: ["torchrun", "--nnodes=2", "--nproc_per_node=1", "/workspace/mnist_ddp.py"]
            volumeMounts:
            - name: script-volume
              mountPath: /workspace  # 挂载到容器内的 /workspace 目录
          volumes:
          - name: script-volume
            configMap:
              name: mnist-script-config
    Worker:
      replicas: 1
      template:
        spec:
          containers:
          - name: pytorch
            image: pytorch/pytorch:latest
            command: ["torchrun", "--nnodes=2", "--nproc_per_node=1", "/workspace/mnist_ddp.py"]
            volumeMounts:
            - name: script-volume
              mountPath: /workspace
          volumes:
          - name: script-volume
            configMap:
              name: mnist-script-config