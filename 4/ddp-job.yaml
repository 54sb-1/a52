apiVersion: v1
kind: ConfigMap
metadata:
  name: mnist-code
data:
  train.py: |
    import os
    import time
    import torch
    import torch.nn as nn
    import torch.optim as optim
    from torchvision import datasets, transforms
    import torch.distributed as dist
    from torch.utils.data.distributed import DistributedSampler
    from torch.utils.data import DataLoader

    class SimpleCNN(nn.Module):
        def __init__(self):
            super().__init__()
            self.conv1 = nn.Conv2d(1, 10, kernel_size=5)
            self.conv2 = nn.Conv2d(10, 20, kernel_size=5)
            self.fc1 = nn.Linear(320, 50)
            self.fc2 = nn.Linear(50, 10)
            self.relu = nn.ReLU()
            self.maxpool = nn.MaxPool2d(2)

        def forward(self, x):
            x = self.relu(self.maxpool(self.conv1(x)))
            x = self.relu(self.maxpool(self.conv2(x)))
            x = x.view(-1, 320)
            x = self.relu(self.fc1(x))
            x = self.fc2(x)
            return x

    def main():
        world_size = int(os.environ.get('WORLD_SIZE', 1))
        is_distributed = world_size > 1

        if is_distributed:
            dist.init_process_group(backend='gloo')
            rank = dist.get_rank()
        else:
            rank = 0

        transform = transforms.Compose([transforms.ToTensor(), transforms.Normalize((0.1307,), (0.3081,))])
        
        # ⚠️ 终极修复：直接让所有 Worker 自己下自己的数据集！(download=True)
        dataset = datasets.MNIST('./data', train=True, download=True, transform=transform)

        if is_distributed:
            sampler = DistributedSampler(dataset, num_replicas=world_size, rank=rank)
            loader = DataLoader(dataset, batch_size=64, sampler=sampler)
        else:
            sampler = None
            loader = DataLoader(dataset, batch_size=64, shuffle=True)

        model = SimpleCNN()
        if is_distributed:
            model = nn.parallel.DistributedDataParallel(model)

        optimizer = optim.SGD(model.parameters(), lr=0.01, momentum=0.5)
        loss_fn = nn.CrossEntropyLoss()

        print(f"[*] Worker {rank} 开始训练... 分布式模式: {is_distributed}")
        start_time = time.time()

        model.train()
        for epoch in range(1):
            for batch_idx, (data, target) in enumerate(loader):
                optimizer.zero_grad()
                output = model(data)
                loss = loss_fn(output, target)
                loss.backward()
                optimizer.step()

                if batch_idx % 150 == 0 and rank == 0:
                    print(f"-> 进度: [Worker 0 处理了 {batch_idx * len(data)} 张图片] Loss: {loss.item():.4f}")

        actual_time = time.time() - start_time
        if rank == 0:
            print("\n" + "="*45)
            mode_str = "分布式 (2 Workers)" if is_distributed else "单机单卡 (1 Worker)"
            print(f"✅ PyTorch MNIST {mode_str} 训练完成!")
            print(f"⏱️ 真实训练耗时: {actual_time:.2f} 秒")
            print("="*45)

    if __name__ == '__main__':
        main()
---
apiVersion: v1
kind: Service
metadata:
  name: ddp-master
spec:
  clusterIP: None
  selector:
    role: master
---
apiVersion: v1
kind: Pod
metadata:
  name: ddp-worker-0
  labels:
    role: master
spec:
  restartPolicy: Never
  containers:
  - name: pytorch
    image: python:3.9-slim
    imagePullPolicy: IfNotPresent
    command: ["/bin/bash", "-c", "pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu && python /app/train.py"]
    env:
    - name: MASTER_ADDR
      value: "ddp-master"
    - name: MASTER_PORT
      value: "23456"
    - name: RANK
      value: "0"
    - name: WORLD_SIZE
      value: "2"
    - name: GLOO_SOCKET_IFNAME
      value: "eth0"
    volumeMounts:
    - name: code
      mountPath: /app
  volumes:
  - name: code
    configMap:
      name: mnist-code
---
apiVersion: v1
kind: Pod
metadata:
  name: ddp-worker-1
  labels:
    role: worker
spec:
  restartPolicy: Never
  containers:
  - name: pytorch
    image: python:3.9-slim
    imagePullPolicy: IfNotPresent
    command: ["/bin/bash", "-c", "pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu && python /app/train.py"]
    env:
    - name: MASTER_ADDR
      value: "ddp-master"
    - name: MASTER_PORT
      value: "23456"
    - name: RANK
      value: "1"
    - name: WORLD_SIZE
      value: "2"
    - name: GLOO_SOCKET_IFNAME
      value: "eth0"
    volumeMounts:
    - name: code
      mountPath: /app
  volumes:
  - name: code
    configMap:
      name: mnist-code